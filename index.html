<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC ANTHONIO journal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input, select { background-color: #0f172a !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8 glass p-6 rounded-2xl border-l-4 border-blue-500">
        <div>
            <h1 class="text-2xl font-bold tracking-tight uppercase">MC ANTHONIO <span class="text-blue-500">JOURNAL 2026</span></h1>
            <p class="text-gray-400 text-sm">Analyse Assistant | Stratégie Institutionnelle</p>
        </div>
        <div class="text-right hidden md:block">
            <div id="clock" class="text-xl font-mono">00:00:00</div>
            <span class="text-xs text-green-500 font-bold underline">SYSTÈME LIVE</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1 glass p-6 rounded-2xl">
            <h2 class="text-xl font-semibold mb-6 border-b border-gray-700 pb-2 flex items-center">
                <span class="mr-2">📊</span> Nouvelle Analyse
            </h2>
            <form id="tradeForm" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase text-gray-400 mb-1 font-bold">Paire de devises</label>
                    <input type="text" id="pair" placeholder="ex: EURUSD" class="w-full rounded p-3 outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1 font-bold">Flux COT</label>
                        <select id="cot" class="w-full rounded p-3">
                            <option value="Bullish">Institutionnel ACHAT</option>
                            <option value="Bearish">Institutionnel VENTE</option>
                            <option value="Neutral">Neutre / Range</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1 font-bold">Sentiment (%)</label>
                        <input type="number" id="sentiment" placeholder="Crowd %" class="w-full rounded p-3" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1 font-bold">Prix d'Entrée</label>
                        <input type="number" step="0.00001" id="entry" class="w-full rounded p-3" required>
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1 font-bold">Stop Loss (SL)</label>
                        <input type="number" step="0.00001" id="sl" class="w-full rounded p-3" required>
                    </div>
                </div>

                <div class="p-4 bg-blue-900/20 border border-blue-500/30 rounded-xl">
                    <p class="text-xs text-blue-400 font-bold uppercase mb-1">Cible Take Profit (RR 1:3)</p>
                    <p id="tpDisplay" class="text-2xl font-mono font-bold text-white">---</p>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                    ENREGISTRER LE TRADE
                </button>
            </form>
        </section>

        <section class="lg:col-span-2 space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass p-5 rounded-2xl text-center">
                    <p class="text-gray-400 text-xs font-bold uppercase mb-1">Win Rate</p>
                    <p id="winRate" class="text-3xl font-black text-blue-400">0%</p>
                </div>
                <div class="glass p-5 rounded-2xl text-center">
                    <p class="text-gray-400 text-xs font-bold uppercase mb-1">Total Trades</p>
                    <p id="totalTrades" class="text-3xl font-black">0</p>
                </div>
                <div class="glass p-5 rounded-2xl text-center border-b-4 border-green-500">
                    <p class="text-gray-400 text-xs font-bold uppercase mb-1">Profit Facteur</p>
                    <p id="profitFactor" class="text-3xl font-black text-green-500">0.0</p>
                </div>
                <div class="glass p-5 rounded-2xl text-center border-b-4 border-purple-500">
                    <p class="text-gray-400 text-xs font-bold uppercase mb-1">Espérance</p>
                    <p id="expectancy" class="text-3xl font-black text-purple-500">0.0</p>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl shadow-2xl">
                <h3 class="text-sm font-bold text-gray-400 uppercase mb-4">Courbe d'Équité (Track Record)</h3>
                <canvas id="equityChart" height="140"></canvas>
            </div>
            
            <button onclick="localStorage.clear(); location.reload();" class="text-xs text-red-500 hover:underline opacity-50">Réinitialiser le journal</button>
        </section>
    </div>

    <script>
        // Horloge temps réel
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Données persistantes
        let trades = JSON.parse(localStorage.getItem('mcanthonio_trades')) || [];

        // Calcul dynamique du TP (Strict RR 1:3)
        const entryInput = document.getElementById('entry');
        const slInput = document.getElementById('sl');
        const tpDisplay = document.getElementById('tpDisplay');

        function updateTP() {
            const entry = parseFloat(entryInput.value);
            const sl = parseFloat(slInput.value);
            if(entry && sl) {
                const risk = Math.abs(entry - sl);
                const tp = entry > sl ? entry + (risk * 3) : entry - (risk * 3);
                tpDisplay.innerText = tp.toFixed(5);
            }
        }

        entryInput.addEventListener('input', updateTP);
        slInput.addEventListener('input', updateTP);

        // Sauvegarde d'un trade
        document.getElementById('tradeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const res = confirm("Le trade a-t-il touché le TP (OK) ou le SL (Annuler) ?");
            const newTrade = {
                pair: document.getElementById('pair').value,
                result: res ? 'WIN' : 'LOSS',
                date: new Date().toLocaleDateString()
            };
            trades.push(newTrade);
            localStorage.setItem('mcanthonio_trades', JSON.stringify(trades));
            location.reload();
        });

        // Graphique et Statistiques
        function initDashboard() {
            const total = trades.length;
            const wins = trades.filter(t => t.result === 'WIN').length;
            document.getElementById('totalTrades').innerText = total;
            document.getElementById('winRate').innerText = total > 0 ? ((wins/total)*100).toFixed(0) + "%" : "0%";
            
            let currentEq = 0;
            let dataPoints = [0];
            let labels = ["Départ"];
            
            trades.forEach((t, i) => {
                currentEq += (t.result === 'WIN' ? 3 : -1);
                dataPoints.push(currentEq);
                labels.push("T" + (i+1));
            });

            new Chart(document.getElementById('equityChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Performance (Unités de Risque)',
                        data: dataPoints,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }
        initDashboard();
    </script>
</body>
                            </html>
