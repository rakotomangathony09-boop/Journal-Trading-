<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Pro Mada - Journal de Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .accent-green { color: #10b981; }
        .accent-red { color: #ef4444; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8 glass p-6 rounded-2xl">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">SIGNAL PRO MADA <span class="text-blue-500">JOURNAL</span></h1>
            <p class="text-gray-400 text-sm">Assistant : Michel Anthonio</p>
        </div>
        <div class="text-right">
            <div id="clock" class="text-xl font-mono">00:00:00</div>
            <span class="text-xs text-green-500 font-bold">SERVEUR LIVE</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1 glass p-6 rounded-2xl">
            <h2 class="text-xl font-semibold mb-6 border-b border-gray-700 pb-2">Nouvelle Analyse</h2>
            <form id="tradeForm" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase text-gray-400 mb-1">Paire / Actif</label>
                    <input type="text" id="pair" placeholder="ex: EURUSD" class="w-full bg-slate-900 border border-gray-700 rounded p-2 focus:border-blue-500 outline-none" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1">Flux COT</label>
                        <select id="cot" class="w-full bg-slate-900 border border-gray-700 rounded p-2">
                            <option value="Bullish">Bullish (Achat)</option>
                            <option value="Bearish">Bearish (Vente)</option>
                            <option value="Neutral">Neutre</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1">Sentiment Myfxbook (%)</label>
                        <input type="number" id="sentiment" placeholder="ex: 75" class="w-full bg-slate-900 border border-gray-700 rounded p-2" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1">Entrée</label>
                        <input type="number" step="0.00001" id="entry" class="w-full bg-slate-900 border border-gray-700 rounded p-2" required>
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1">Stop Loss</label>
                        <input type="number" step="0.00001" id="sl" class="w-full bg-slate-900 border border-gray-700 rounded p-2" required>
                    </div>
                </div>

                <div class="p-3 bg-blue-900/30 border border-blue-500/50 rounded-lg">
                    <p class="text-xs text-blue-300">Objectif Take Profit (RR 1:3) :</p>
                    <p id="tpDisplay" class="text-lg font-bold text-white">---</p>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">ENREGISTRER LE TRADE</button>
            </form>
        </section>

        <section class="lg:col-span-2 space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass p-4 rounded-xl text-center">
                    <p class="text-gray-400 text-xs uppercase">Win Rate</p>
                    <p id="winRate" class="text-2xl font-bold">0%</p>
                </div>
                <div class="glass p-4 rounded-xl text-center">
                    <p class="text-gray-400 text-xs uppercase">Trades</p>
                    <p id="totalTrades" class="text-2xl font-bold">0</p>
                </div>
                <div class="glass p-4 rounded-xl text-center border-b-4 border-green-500">
                    <p class="text-gray-400 text-xs uppercase">Profit Facteur</p>
                    <p id="profitFactor" class="text-2xl font-bold">0.0</p>
                </div>
                <div class="glass p-4 rounded-xl text-center border-b-4 border-blue-500">
                    <p class="text-gray-400 text-xs uppercase">Espérance</p>
                    <p id="expectancy" class="text-2xl font-bold">0.0</p>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl">
                <canvas id="equityChart" height="150"></canvas>
            </div>
        </section>
    </div>

    <script>
        // Logique Horloge
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Variables de données
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let equityData = [0];

        const form = document.getElementById('tradeForm');
        const tpDisplay = document.getElementById('tpDisplay');

        // Calcul automatique du TP (RR 1:3)
        document.getElementById('sl').addEventListener('input', () => {
            const entry = parseFloat(document.getElementById('entry').value);
            const sl = parseFloat(document.getElementById('sl').value);
            if(entry && sl) {
                const risk = Math.abs(entry - sl);
                const tp = entry > sl ? entry + (risk * 3) : entry - (risk * 3);
                tpDisplay.innerText = tp.toFixed(5);
            }
        });

        // Enregistrement du Trade
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newTrade = {
                pair: document.getElementById('pair').value,
                result: Math.random() > 0.4 ? 'WIN' : 'LOSS', // Simulation pour démo
                date: new Date().toLocaleDateString()
            };
            trades.push(newTrade);
            localStorage.setItem('trades', JSON.stringify(trades));
            updateStats();
            alert("Trade enregistré avec succès !");
            location.reload();
        });

        // Mise à jour des Stats
        function updateStats() {
            const total = trades.length;
            const wins = trades.filter(t => t.result === 'WIN').length;
            const winRate = total > 0 ? (wins / total * 100).toFixed(1) : 0;
            
            document.getElementById('totalTrades').innerText = total;
            document.getElementById('winRate').innerText = winRate + "%";
            
            // Calcul d'une courbe d'équité simple pour la démo
            let currentEquity = 0;
            const chartLabels = ["Start"];
            trades.forEach((t, i) => {
                currentEquity += t.result === 'WIN' ? 3 : -1;
                equityData.push(currentEquity);
                chartLabels.push("T" + (i+1));
            });

            new Chart(document.getElementById('equityChart'), {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: 'Performance Signal Pro Mada (RR 1:3)',
                        data: equityData,
                        borderColor: '#3b82f6',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)'
                    }]
                },
                options: { scales: { y: { grid: { color: '#334155' } } } }
            });
        }

        updateStats();
    </script>
</body>
  </html>
